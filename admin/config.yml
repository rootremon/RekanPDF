backend:
  name: git-gateway
  branch: main 

media_folder: "img/uploads" 
public_folder: "/img/uploads"

collections:
  - name: "artikel"
    label: "Artikel SEO"
    folder: "artikel" 
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Judul", name: "title", widget: "string"}
      - {label: "Deskripsi (Untuk SEO Meta)", name: "description", widget: "text"}
      - {label: "Keywords (pisahkan dengan koma)", name: "keywords", widget: "string", required: false}
      - {label: "Kategori Breadcrumb", name: "category", widget: "string", default: "Panduan PDF"}
      - {label: "Estimasi Waktu Baca (Angka saja)", name: "read_time", widget: "number", default: 5}
      - {label: "Tanggal", name: "date", widget: "datetime"}
      - {label: "Isi Artikel", name: "body", widget: "markdown"}

